<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hallo Xenia!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --pink: #ff69b4;
      --hot-pink: #ff1493;
      --dark-pink: #c2185b;
      --light-pink: #ffb3d9;
      --black: #1a0010;
      --rain-color: #ff69b4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--black);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
      pointer-events: none;
    }

    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: repeating-linear-gradient(
        90deg,
        #5d3a1a 0px, #5d3a1a 32px,
        #4a2e12 32px, #4a2e12 64px
      );
      border-top: 4px solid #7a4f2a;
      z-index: 1;
    }
    .ground::before {
      content: '';
      position: absolute;
      top: -8px; left: 0; right: 0;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #4caf50 0px, #4caf50 32px,
        #388e3c 32px, #388e3c 64px
      );
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px;
    }

    .pixel-box {
      background: #1a0010;
      border: 4px solid var(--pink);
      box-shadow:
        0 0 0 4px #1a0010,
        0 0 0 8px var(--hot-pink),
        0 0 30px var(--hot-pink),
        inset 0 0 20px rgba(255, 20, 147, 0.1);
      padding: 40px 50px;
      position: relative;
    }
    .pixel-box::before, .pixel-box::after {
      content: '■';
      position: absolute;
      color: var(--hot-pink);
      font-size: 12px;
    }
    .pixel-box::before { top: -6px; left: -6px; }
    .pixel-box::after  { bottom: -6px; right: -6px; }

    .title {
      color: var(--light-pink);
      font-size: clamp(14px, 3vw, 24px);
      text-align: center;
      text-shadow:
        3px 3px 0 var(--dark-pink),
        0 0 20px var(--hot-pink),
        0 0 40px var(--pink);
      line-height: 1.8;
      animation: flicker 3s infinite;
    }
    .title span {
      color: var(--hot-pink);
      display: inline-block;
      animation: bounce 1s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.8; }
      97% { opacity: 1; }
      98% { opacity: 0.6; }
    }
    @keyframes bounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-6px); }
    }

    .hearts {
      font-size: 20px;
      display: flex;
      gap: 8px;
      justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    .yt-btn {
      display: inline-block;
      background: var(--hot-pink);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.5vw, 12px);
      text-decoration: none;
      padding: 18px 30px;
      cursor: pointer;
      position: relative;
      box-shadow:
        4px 4px 0 var(--dark-pink),
        8px 8px 0 #7a0038,
        0 0 20px var(--hot-pink);
      transition: transform 0.1s, box-shadow 0.1s;
      text-align: center;
      line-height: 1.8;
    }
    .yt-btn:hover {
      transform: translate(2px, 2px);
      box-shadow:
        2px 2px 0 var(--dark-pink),
        4px 4px 0 #7a0038,
        0 0 30px var(--hot-pink);
      background: #ff2da0;
    }
    .yt-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 20px var(--hot-pink);
    }

    .cloud {
      position: fixed;
      top: 30px;
      width: 64px; height: 32px;
      background: rgba(255, 182, 217, 0.15);
      border: 2px solid rgba(255, 105, 180, 0.3);
      z-index: 1;
      animation: cloudDrift linear infinite;
    }
    .cloud:nth-child(1) { left: -80px; animation-duration: 20s; top: 40px; }
    .cloud:nth-child(2) { left: -80px; animation-duration: 28s; top: 80px; animation-delay: -10s; width: 96px; }
    .cloud:nth-child(3) { left: -80px; animation-duration: 35s; top: 20px; animation-delay: -20s; }

    @keyframes cloudDrift {
      from { transform: translateX(-100px); }
      to   { transform: translateX(110vw); }
    }

    .pixel-label {
      color: rgba(255, 105, 180, 0.5);
      font-size: 8px;
      text-align: center;
      margin-top: -20px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <canvas id="rain"></canvas>

  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>

  <div class="container">
    <div class="pixel-box">
      <div class="hearts">💗 💖 💗 💖 💗</div>
      <br>
      <div class="title">
        Hallo<br>
        <span>Xenia!</span>
      </div>
      <br><br>
      <a class="yt-btn" href="https://youtube.com/@ksenispielt?si=QV_7hykSjTVH_rwU" target="_blank">
        <span>▶</span>
        DRÜCK HIER!<br>
        <span style="font-size:0.7em; opacity:0.85;">@ksenispielt</span>
      </a>
      <br><br>
      <div class="pixel-label">★ MINECRAFT EDITION ★</div>
    </div>
  </div>

  <div class="ground"></div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PIXEL = 6;
    let drops = [];

    function initDrops() {
      const colCount = Math.ceil(canvas.width / PIXEL);
      drops = Array.from({ length: colCount }, () =>
        Math.floor(Math.random() * -Math.ceil(canvas.height / PIXEL))
      );
    }
    initDrops();
    window.addEventListener('resize', initDrops);

    const pinkShades = ['#ff69b4','#ff1493','#ffb3d9','#c2185b','#ff80c0','#ff3399'];

    function drawRain() {
      ctx.fillStyle = 'rgba(26, 0, 16, 0.18)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < drops.length; i++) {
        const x = i * PIXEL;
        const y = drops[i] * PIXEL;
        const shade = pinkShades[Math.floor(Math.random() * pinkShades.length)];
        ctx.fillStyle = shade;
        ctx.shadowColor = shade;
        ctx.shadowBlur = 4;
        ctx.fillRect(x, y, PIXEL - 1, PIXEL - 1);
        ctx.shadowBlur = 0;

        if (y > canvas.height && Math.random() > 0.975) {
          drops[i] = Math.floor(Math.random() * -20);
        }
        drops[i]++;
      }
    }

    setInterval(drawRain, 50);
  </script>

</body>
</html>
